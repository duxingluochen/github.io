<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WebStack 导航 | 模块化版</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 拆分后的 CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/main-content.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-compass"></i></div>
            <div class="logo-text">
                <h1>导航网址</h1>
                <p>资源·工具·灵感</p>
            </div>
        </div>
        <div class="nav-menu" id="navMenu"></div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="main">
        <div class="top-bar">
            <button class="menu-toggle" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索站点名称、描述...">
            </div>
        </div>
        <div class="scrollable-content">
            <div id="cardsContainer"></div>
            <div class="footer">
                <p>📚 开源导航 | 收录优质实用资源，让上网更高效。 所有链接仅供学习参考，指向互联网公开内容。</p>
                <p style="margin-top: 8px;">⚡ 持续更新 · 建议收藏 · <i class="fas fa-heart heart"></i> 共享知识</p>
                <div class="copyright">
                    © 2025 导航 | <a href="#">关于我们</a> | <a href="#">反馈建议</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="expressModal" class="modal-overlay">
    <div class="modal-content">
        <button class="modal-close" id="modalCloseBtn">&times;</button>
        <img id="modalImage" src="img/su.jpg" alt="快递服务" style="width:100%; max-height:480px; object-fit:cover;">
        <p>使用微信扫一扫  聚合多家快递品牌</p>
    </div>
</div>

<!-- 数据模块 -->
<script src="js/data/categories.js"></script>
<script src="js/data/cards.js"></script>
<!-- 工具函数 -->
<script src="js/utils.js"></script>
<!-- 功能模块 -->
<script src="js/sidebar.js"></script>
<script src="js/cards.js"></script>
<script src="js/search.js"></script>
<script src="js/modal.js"></script>
<!-- 主入口 -->
<script src="js/main.js"></script>

</body>
</html>
