<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WebStack 导航 | 优化版</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f5f7;
            color: #1e293b;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        /* ========= 左侧边栏 (桌面端默认显示) ========= */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #eef2f6;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.08);
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 200;
        }

        /* Logo区域 */
        .logo-area {
            padding: 24px 20px;
            border-bottom: 1px solid #eff3f8;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 6px 12px -6px rgba(59,130,246,0.3);
        }
        .logo-text h1 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(120deg, #1e293b, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo-text p {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 2px;
        }

        .nav-menu {
            flex: 1;
            padding: 20px 12px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* 一级菜单项 */
        .menu-item {
            border-radius: 14px;
            transition: all 0.2s;
        }
        .menu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 600;
            color: #1e293b;
            transition: background 0.2s;
            user-select: none;
        }
        .menu-header:hover {
            background: #f1f5f9;
        }
        .menu-header .title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }
        .menu-header .title i {
            width: 24px;
            color: #3b82f6;
            font-size: 1.1rem;
        }
        .chevron {
            transition: transform 0.25s;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .menu-item.open .chevron {
            transform: rotate(90deg);
        }
        /* 二级菜单列表 */
        .sub-menu {
            list-style: none;
            margin-left: 28px;
            padding-left: 12px;
            border-left: 2px solid #eef2ff;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            max-height: 500px;
        }
        .menu-item:not(.open) .sub-menu {
            max-height: 0;
        }
        .sub-menu li {
            margin: 6px 0;
        }
        .sub-cat {
            display: block;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .sub-cat i {
            width: 24px;
            display: inline-block;
            font-size: 0.8rem;
            margin-right: 8px;
            color: #7c8ba0;
        }
        .sub-cat:hover {
            background: #f1f5f9;
            color: #0f172a;
        }
        .sub-cat.active {
            background: #eef2ff;
            color: #2563eb;
            font-weight: 600;
        }
        .sub-cat.active i {
            color: #2563eb;
        }

        /* ========= 右侧主区域 ========= */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f8fafc;
            width: 100%;
        }
        /* 顶部栏：搜索 + 汉堡菜单（桌面端隐藏汉堡按钮） */
        .top-bar {
            background: white;
            padding: 16px 24px;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .menu-toggle {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #334155;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: none; /* 桌面端隐藏 */
            align-items: center;
            justify-content: center;
        }
        .menu-toggle:hover {
            background: #f1f5f9;
        }
        .search-wrapper {
            flex: 1;
            position: relative;
            max-width: 500px;
        }
        .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
        }
        #searchInput {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 1px solid #e2e8f0;
            border-radius: 32px;
            font-size: 0.9rem;
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
        }
        #searchInput:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        /* 滚动区域：包含卡片和页脚 */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 28px 24px;
        }

        /* 分组样式 */
        .category-group {
            margin-bottom: 32px;
            scroll-margin-top: 20px; /* 滚动时留出顶部间距 */
        }
        .category-group:last-child {
            margin-bottom: 0;
        }
        .group-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            /* 去掉分类标题下面的线 */
            border-bottom: none;
        }
        .group-title i {
            font-size: 1.4rem;
            color: #3b82f6;
            background: #eef2ff;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .group-title h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0f172a;
            letter-spacing: -0.2px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.03);
            border: 1px solid #edf2f7;
            transition: all 0.25s ease;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.12);
            border-color: #cbdff2;
        }
        .card-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #f1f5fe, #ffffff);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #3b82f6;
            flex-shrink: 0;
            box-shadow: 0 4px 8px -4px rgba(0,0,0,0.05);
        }
        .card-content {
            flex: 1;
        }
        .card-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
            color: #0f172a;
        }
        .card-desc {
            font-size: 0.75rem;
            color: #5b6e8c;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 1rem;
        }

        /* 页脚样式 */
        .footer {
            margin-top: 3rem;
            text-align: center;
            padding: 1.5rem 1rem 1rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.8rem;
            color: #5b6e8c;
            background: #f8fafc;
        }
        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .footer .heart {
            color: #ef4444;
            margin: 0 2px;
        }
        .footer .copyright {
            margin-top: 8px;
            font-size: 0.75rem;
            opacity: 0.8;
        }

        /* 移动端遮罩层（仅移动端使用） */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 99;
            backdrop-filter: blur(2px);
        }
        .sidebar-overlay.active {
            display: block;
        }

        /* ========= 弹窗样式 ========= */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal-content {
            position: relative;
            background: white;
            border-radius: 24px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            cursor: default;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 36px;
            height: 36px;
            background: #ff4444;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .modal-close:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
        .modal-img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
        }

        /* ========= 响应式: 移动端 (宽度 ≤ 768px) ========= */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 200;
                box-shadow: 2px 0 20px rgba(0,0,0,0.1);
                transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-toggle {
                display: flex; /* 移动端显示汉堡按钮 */
            }
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .top-bar {
                padding: 12px 16px;
            }
            .scrollable-content {
                padding: 20px 16px;
            }
            .group-title h2 {
                font-size: 1.1rem;
            }
            .footer {
                padding: 1rem 0.8rem;
                margin-top: 2rem;
            }
            .modal-content {
                max-width: 95vw;
                max-height: 95vh;
            }
            .modal-close {
                width: 32px;
                height: 32px;
                font-size: 20px;
                top: 8px;
                left: 8px;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f6;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-compass"></i></div>
            <div class="logo-text">

</div>

    // DOM 元素
    const navMenuEl = document.getElementById("navMenu");
    const cardsContainer = document.getElementById("cardsContainer");
    const searchInput = document.getElementById("searchInput");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebarOverlay");
    const menuToggleBtn = document.getElementById("menuToggleBtn");
    const modal = document.getElementById("expressModal");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const modalImage = document.getElementById("modalImage");

    let currentSearchKeyword = "";
    // 用于高亮侧边栏选中的二级分类
    let activeSubCategoryId = null;

    // 存储每个一级菜单的折叠/展开状态 (初始全部折叠)
    const menuOpenState = {};
    primaryMenus.forEach(menu => { menuOpenState[menu.id] = false; });

    // 弹窗控制
    function openModal(imgUrl) {
        modalImage.src = imgUrl;
        modal.style.display = "flex";
        document.body.style.overflow = "hidden"; // 防止背景滚动
    }
    function closeModal() {
        modal.style.display = "none";
        document.body.style.overflow = "";
    }

    // 关闭侧边栏（仅移动端）
    function closeSidebar() {
        if (window.innerWidth <= 768) {
            sidebar.classList.remove("open");
            overlay.classList.remove("active");
        }
    }
    // 打开侧边栏（仅移动端）
    function openSidebar() {
        if (window.innerWidth <= 768) {
            sidebar.classList.add("open");
            overlay.classList.add("active");
        }
    }

    // 渲染侧边栏（保留折叠状态）
    function renderSidebar() {
        navMenuEl.innerHTML = "";
        primaryMenus.forEach(primary => {
            const childrenCats = subCategories.filter(cat => cat.parentId === primary.id);
            if (childrenCats.length === 0) return;
            const menuItemDiv = document.createElement("div");
            const isOpen = menuOpenState[primary.id];
            menuItemDiv.className = `menu-item ${isOpen ? 'open' : ''}`;
            
            const header = document.createElement("div");
            header.className = "menu-header";
            header.innerHTML = `
                <div class="title">
                    <i class="${primary.icon}"></i>
                    <span>${primary.name}</span>
                </div>
                <i class="fas fa-chevron-right chevron"></i>
            `;
            header.addEventListener("click", (e) => {
                e.stopPropagation();
                menuOpenState[primary.id] = !menuOpenState[primary.id];
                renderSidebar();
            });
            
            const subUl = document.createElement("ul");
            subUl.className = "sub-menu";
            childrenCats.forEach(sub => {
                const li = document.createElement("li");
                const linkSpan = document.createElement("span");
                linkSpan.className = "sub-cat";
                if (activeSubCategoryId === sub.id) linkSpan.classList.add("active");
                linkSpan.innerHTML = `<i class="${sub.icon}"></i> ${sub.name}`;
                linkSpan.addEventListener("click", (e) => {
                    e.stopPropagation();
                    // 1. 关闭其他所有一级菜单，只展开当前所属一级
                    const targetParentId = sub.parentId;
                    for (const key in menuOpenState) {
                        menuOpenState[key] = (key === targetParentId);
                    }
                    renderSidebar();  // 刷新侧边栏
                    
                    // 2. 更新高亮
                    activeSubCategoryId = sub.id;
                    renderSidebar(); // 再次渲染以高亮当前选中项
                    
                    // 3. 清空搜索框，展示全部内容
                    currentSearchKeyword = "";
                    searchInput.value = "";
                    // 重新渲染右侧（全部分组）
                    renderCards();
                    
                    // 4. 滚动到对应分类位置
                    scrollToCategory(sub.id);
                    
                    // 5. 关闭移动端侧边栏
                    closeSidebar();
                });
                li.appendChild(linkSpan);
                subUl.appendChild(li);
            });
            menuItemDiv.appendChild(header);
            menuItemDiv.appendChild(subUl);
            navMenuEl.appendChild(menuItemDiv);
        });
    }

    // 滚动到指定分类
    function scrollToCategory(categoryId) {
        const targetElement = document.getElementById(`category-${categoryId}`);
        if (targetElement) {
            targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    // 渲染右侧：始终展示全部分组（不筛选），但支持搜索筛选
    function renderCards() {
        // 根据搜索词筛选卡片
        let filteredCards = [...cardsData];
        if (currentSearchKeyword && currentSearchKeyword.trim() !== "") {
            const kw = currentSearchKeyword.trim().toLowerCase();
            filteredCards = filteredCards.filter(card => 
                card.title.toLowerCase().includes(kw) || card.desc.toLowerCase().includes(kw)
            );
        }
        
        if (filteredCards.length === 0) {
            cardsContainer.innerHTML = `<div class="no-results"><i class="fas fa-folder-open"></i> 没有找到相关站点～ 试试其他关键词</div>`;
            return;
        }
        
        // 按二级分类分组
        const groupMap = new Map();
        filteredCards.forEach(card => {
            const cat = subCategories.find(c => c.id === card.categoryId);
            if (!cat) return;
            if (!groupMap.has(cat.id)) {
                groupMap.set(cat.id, { category: cat, cards: [] });
            }
            groupMap.get(cat.id).cards.push(card);
        });
        
        // 按照 subCategories 原始顺序输出分组
        const orderedGroups = [];
        for (const cat of subCategories) {
            if (groupMap.has(cat.id)) {
                orderedGroups.push(groupMap.get(cat.id));
            }
        }
        
        let html = '';
        for (const group of orderedGroups) {
            const cat = group.category;
            const cards = group.cards;
            html += `
                <div class="category-group" id="category-${cat.id}">
                    <div class="group-title">
                        <i class="${cat.icon}"></i>
                        <h2>${escapeHtml(cat.name)}</h2>
                    </div>
                    <div class="cards-grid">
                        ${cards.map(card => renderCardHtml(card)).join('')}
                    </div>
                </div>
            `;
        }
        cardsContainer.innerHTML = html;
    }
    
    function renderCardHtml(card) {
        // 特殊处理“发快递”卡片：添加自定义类并阻止默认跳转
        if (card.title === "发快递") {
            return `
                <a href="javascript:void(0);" class="card express-card" data-express="true">
                    <div class="card-icon"><i class="${card.icon}"></i></div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(card.title)}</div>
                        <div class="card-desc">${escapeHtml(card.desc)}</div>
                    </div>
                </a>
            `;
        }
        return `
            <a href="${card.url}" target="_blank" rel="noopener noreferrer" class="card">
                <div class="card-icon"><i class="${card.icon}"></i></div>
                <div class="card-content">
                    <div class="card-title">${escapeHtml(card.title)}</div>
                    <div class="card-desc">${escapeHtml(card.desc)}</div>
                </div>
            </a>
        `;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function initSearch() {
        searchInput.addEventListener("input", (e) => {
            currentSearchKeyword = e.target.value;
            if (currentSearchKeyword.trim() !== "") {
                // 搜索时清除选中的分类高亮
                activeSubCategoryId = null;
                renderSidebar();
            }
            renderCards();
        });
    }
    
    // 事件委托：处理快递卡片点击
    function bindExpressClick() {
        cardsContainer.addEventListener("click", (e) => {
            // 查找点击的目标或父级是否有 .express-card
            let target = e.target;
            while (target && target !== cardsContainer) {
                if (target.classList && target.classList.contains("express-card")) {
                    e.preventDefault();
                    // 打开弹窗，使用快递图片
                    openModal("img/su.jpg"); // 快递主题图片
                    return;
                }
                target = target.parentElement;
            }
        });
    }
    
    overlay.addEventListener("click", closeSidebar);
    menuToggleBtn.addEventListener("click", openSidebar);
    modalCloseBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
    });
    
    // 监听窗口大小变化，确保移动端侧边栏状态正确
    window.addEventListener("resize", () => {
        if (window.innerWidth > 768) {
            sidebar.classList.remove("open");
            overlay.classList.remove("active");
        }
    });
    
    function init() {
        renderSidebar();
        renderCards();
        initSearch();
        bindExpressClick();
        if (window.innerWidth <= 768) {
            closeSidebar();
        }
    }
    init();
</script>
